# Canonical source: SDLC/agent/templates/MILESTONE_META_ISSUE_TEMPLATE.md
name: Milestone Meta-Issue
description: Tracking issue for milestone scope and completion gate.
title: "[Milestone N] Meta-Issue"
labels: []
body:
  - type: textarea
    id: goal
    attributes:
      label: Milestone Goal
      description: System-level outcome for this milestone.
      placeholder: Deliver capability X with runnable spine preserved.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: In-scope capabilities.
      placeholder: |
        - Capability 1
        - Capability 2
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Explicit exclusions.
      placeholder: |
        - Exclusion 1
        - Exclusion 2
    validations:
      required: true

  - type: textarea
    id: issues
    attributes:
      label: Issues
      description: Checklist of milestone issues.
      placeholder: |
        - [ ] #123
        - [ ] #124
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Milestone-level acceptance checks.
      placeholder: |
        - System is runnable end-to-end
        - Milestone goals satisfied
    validations:
      required: true

  - type: textarea
    id: gate
    attributes:
      label: Milestone Test Gate (must pass before QA sign-off)
      description: Copy/paste runnable verification commands.
      placeholder: |
        - .venv/bin/python -m pytest -q tests/test_new_scope.py
        - .venv/bin/python -m pytest -q tests/test_regression_scope.py
        - make status ENV=dev
    validations:
      required: true
