name: Implementation Issue
description: Atomic issue for milestone execution work.
title: "[Area] Action-oriented description"
labels: []
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: 1-3 sentences describing desired outcome.
      placeholder: Implement X so that Y can do Z.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Related links, constraints, invariants, and touched contracts.
      placeholder: |
        Links:
        Constraints:
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Checklist of outcomes that must be true to close this issue.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: required_tests
    attributes:
      label: Required Tests (must pass)
      description: Exact commands required before closing the issue.
      placeholder: |
        New/updated tests:
        - tests/test_example.py::test_new_behavior

        Regression tests:
        - tests/test_existing.py::test_regression_guard

        Commands:
        - .venv/bin/python -m pytest -q tests/test_example.py::test_new_behavior
        - .venv/bin/python -m pytest -q tests/test_existing.py::test_regression_guard
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Explicitly out of scope for this issue.
      placeholder: |
        - Not changing contract X
        - Not refactoring subsystem Y
    validations:
      required: true

  - type: textarea
    id: verification_notes
    attributes:
      label: Verification Notes (optional)
      description: Runtime/manual checks beyond automated tests.
      placeholder: |
        - make run ENV=dev
        - curl http://localhost:8000/health
